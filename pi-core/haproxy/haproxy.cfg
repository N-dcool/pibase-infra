# ==================================================================
# PiBase HAProxy - SNI-based TCP router for database connections
# ==================================================================
#
# All databases share port 5432. Clients connect via:
#   psql "postgresql://user:pass@db-<slug>.db.nareshchoudhary.com:5432/mydb?sslmode=require"
#
# HAProxy terminates TLS, extracts the SNI hostname, looks up the 
# internal port from a map file, and forwards to 127.0.0.1:<port>.
#
# The map file is managed by the Java API via the Runtime API socket
# (add map / del map) - no config reload needed.
#
# ==================================================================

global
    log stdout format raw local0
    maxconn 1024

    # Runtime API - allows map updates without reload
    stats socket /var/run/haproxy.sock mode 666 level admin

defaults
    mode tcp
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    log global
    option tcplog

# --- Frontend - TLS termination + SNI routing ------------------
frontend db_frontend
    bind *:5432 ssl crt /etc/haproxy/certs/db-wildcard.pem alpn postgresql

    # Extract database slug from SNI hostname (ssl_fn_sni works after TLS termination)
    # SNI: "db-a1b2c3d4.db.nareshchoudhary.com" -> var = "db-a1b2c3d4"
    tcp-request content set-var(txn.dbid) ssl_fc_sni,regsub(\.db\.nareshchoudhary\.com$,)

    # Reject immediately if hostname not in map (port resolves to 0)
    tcp-request content reject unless { var(txn.dbid),map(/etc/haproxy/maps/db-ports.map) -m found }

    default_backend db_pool

# --- Backend - dynamic port from map lookup --------------------
backend db_pool
    mode tcp

    # Set destination port dynamically from map
    tcp-request content set-dst-port var(txn.dbid),map(/etc/haproxy/maps/db-ports.map)

    # All databases run on localhost, port is set dynamically above
    server db 127.0.0.1:0