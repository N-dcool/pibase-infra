# —— PiBase API – Portainer Stack ——
# Portainer → Stacks → Add stack → paste this
#
# Add these environment variables in Portainer's UI:
#   DOCKERHUB_USERNAME = your-dockerhub-username
#   JWT_SECRET         = <generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))">
#   ALLOWED_ORIGINS    = https://db.nareshchoudhary.com
#
# Then deploy.

services:
  pibase-api:
    image: ${DOCKERHUB_USERNAME}/pibase-api:latest
    container_name: pibase-api
    restart: unless-stopped
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pibase-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_HOST=db.nareshchoudhary.com
      - CORS_ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://db.nareshchoudhary.com}
    labels:
      # —— Traefik routing ——
      - "traefik.enable=true"
      - "traefik.http.routers.pibase-api.rule=Host(`backend.nareshchoudhary.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.pibase-api.entrypoints=web"
      - "traefik.http.routers.pibase-api.priority=93"
      - "traefik.http.services.pibase-api.loadbalancer.server.port=8080"
      # —— Watchtower auto-update ——
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - proxy

volumes:
  pibase-data:

networks:
  proxy:
    external: true