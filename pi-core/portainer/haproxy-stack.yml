# PiBase HAProxy Stack
# Deploy AFTER traefik, watchtower, and pibase-api stacks.
#
# HAProxy routes all database connections through a single port (5432)
# using TLS SNI to identify the target database. The map file
# (db-ports.map) is updated live by the Java API via Runtime API
# socket - no container restart or SIGHUP needed.
#
# ================================================================

services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: pibase-haproxy
    restart: unless-stopped

    # Host networking - HAProxy needs to reach database containers
    # bound to 127.0.0.1:5433-5582. No Docker bridge overhead.
    network_mode: host

    volumes:
      # Main config (static, never changes at runtime)
      - /opt/pibase/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

      # Port map file (written by Java API, read by HAProxy)
      - /opt/pibase/haproxy/maps:/etc/haproxy/maps:ro

      # Wildcard TLS certificate
      - /opt/pibase/haproxy/certs:/etc/haproxy/certs:ro

      # Runtime API socket (Java API sends add/del map commands here)
      - /opt/pibase/haproxy/run:/var/run

    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 5s
      retries: 3

    labels:
      - "com.centurylinklabs.watchtower.enable=false"